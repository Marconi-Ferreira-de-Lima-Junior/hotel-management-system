{% extends 'pdv/base.html' %}

{% block content %}

<div class="titulo">
    <h2>💰 Lista de Receitas</h2>
    <a href="{% url 'cadastrar_receitas' %}" class="btn">➕ Nova Receita</a>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            {% for receita in receitas %}
            <tr>
                <td>{{ receita.descricao }}</td>
                <td>R$ {{ receita.valor }}</td>
                <td>{{ receita.data }}</td>
                <td>
                    <a href="{% url 'editar_receita' receita.id %}" class="btn btn-secondary">✏️</a>
                    <a href="{% url 'excluir_receita' receita.id %}" class="btn btn-danger">❌</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">Nenhuma receita cadastrada.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
