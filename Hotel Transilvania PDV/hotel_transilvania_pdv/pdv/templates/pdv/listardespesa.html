{% extends 'pdv/base.html' %}

{% block content %}

<div class="titulo">
    <h2>💸 Lista de Despesas</h2>
    <a href="{% url 'cadastrar_despesas' %}" class="btn">➕ Nova Despesa</a>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            {% for despesa in despesas %}
            <tr>
                <td>{{ despesa.descricao }}</td>
                <td>R$ {{ despesa.valor }}</td>
                <td>{{ despesa.data }}</td>
                <td>
                    <a href="{% url 'editar_despesa' despesa.id %}" class="btn btn-secondary">✏️</a>
                    <a href="{% url 'excluir_despesa' despesa.id %}" class="btn btn-danger">❌</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">Nenhuma despesa cadastrada.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
