{% extends 'pdv/base.html' %}

{% block content %}

<div class="titulo">
    <h2>🦇 Excluir Quarto 🛏️</h2>
</div>

<div class="card form-container">

    <p>Tem certeza que deseja excluir o quarto <strong>{{ quarto.numero }}</strong>?</p>

    <div class="actions-center">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑️ Excluir</button>
        </form>

        <br>

        <a href="{% url 'listar_quartos' %}" class="btn btn-secondary">❌ Cancelar</a>
    </div>

</div>

{% endblock %}
