{% extends 'pdv/base.html' %}

{% block content %}

<div class="titulo">
    <h2>🖋️ Editar Hóspede</h2>
</div>

<div class="form-container card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">Salvar</button>
        <a href="{% url 'clientes' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

{% endblock %}
