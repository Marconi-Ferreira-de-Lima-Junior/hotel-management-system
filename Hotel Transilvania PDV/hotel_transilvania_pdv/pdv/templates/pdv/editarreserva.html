{% extends 'pdv/base.html' %}

{% block content %}

<div class="titulo">
    <h2>✏️ Editar Reserva</h2>
</div>

<div class="card form-container">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">Salvar Alterações</button>
        <a href="{% url 'reservas' %}" class="btn btn-secondary">Voltar</a>
    </form>
</div>

{% endblock %}
