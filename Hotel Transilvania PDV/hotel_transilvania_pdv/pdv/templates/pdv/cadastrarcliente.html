{% extends 'pdv/base.html' %}

{% block content %}

<div class="titulo">
    <h2>🦇 Cadastrar Novo Hóspede</h2>
</div>

<div class="card form-container">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">💾 Salvar</button>
        <a href="{% url 'clientes' %}" class="btn btn-secondary">🔙 Voltar</a>
    </form>
</div>

{% endblock %}
