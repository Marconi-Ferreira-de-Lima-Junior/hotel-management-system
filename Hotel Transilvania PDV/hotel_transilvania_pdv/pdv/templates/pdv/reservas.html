{% extends 'pdv/base.html' %}

{% block content %}

<div class="titulo">
    <h2>🛏️ Lista de Reservas</h2>
    <a href="{% url 'criar_reserva' %}" class="btn">➕ Nova Reserva</a>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Quarto</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            {% for reserva in reservas %}
            <tr>
                <td>{{ reserva.id }}</td>
                <td>{{ reserva.cliente }}</td>
                <td>{{ reserva.quarto }}</td>
                <td>
                    <a href="{% url 'editar_reserva' reserva.id %}" class="btn btn-secondary">✏️</a>
                    <a href="{% url 'excluir_reserva' reserva.id %}" class="btn btn-danger">❌</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">Nenhuma reserva encontrada.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
